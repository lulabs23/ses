<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SES — Révisions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --socio: #2563eb; --eco: #dc2626; --cross: #7c3aed;
  --bg: #0f0e13; --surface: #1a1825; --surface2: #231f30;
  --border: rgba(255,255,255,0.07);
  --text: #f0eef8; --muted: #8b879e; --accent: #f0c040;
  --known: #16a34a; --learning: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(37,99,235,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(220,38,38,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(124,58,237,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
#app {
  position: relative; z-index: 1;
  max-width: 980px; margin: 0 auto; padding: 10px 24px 80px;
}

/* ── HERO ── */
.hero { text-align: center; margin-bottom: 6px; }
.hero-eyebrow {
  display: inline-block; font-size: 0.72rem; letter-spacing: 0.18em;
  text-transform: uppercase; font-weight: 600; color: var(--accent);
  border: 1px solid rgba(240,192,64,0.3); padding: 4px 12px; border-radius: 999px; margin-bottom: 6px;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 3.5vw, 2.4rem); font-weight: 800; line-height: 1.1; margin-bottom: 4px;
  background: linear-gradient(135deg, #f0eef8 30%, #c4bfdb);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { font-size: 0.88rem; color: var(--muted); font-weight: 300; }

/* ── LEGEND ── */
.legend { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.8rem; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-dot.socio { background: var(--socio); }
.legend-dot.eco   { background: var(--eco); }
.legend-dot.cross { background: var(--cross); }

/* ── GRID ── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

/* ── CHAPTER CARD ── */
.chapter-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px; position: relative; overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease; animation: fadeUp 0.5s ease both;
}
.chapter-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.chapter-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; border-radius:20px 20px 0 0; }
.chapter-card.socio::before { background: var(--socio); }
.chapter-card.eco::before   { background: var(--eco); }
.chapter-card.cross::before { background: var(--cross); }
.chapter-card.socio { --chip-color: var(--socio); --chip-bg: rgba(37,99,235,0.12); }
.chapter-card.eco   { --chip-color: var(--eco);   --chip-bg: rgba(220,38,38,0.12); }
.chapter-card.cross { --chip-color: var(--cross); --chip-bg: rgba(124,58,237,0.12); }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.chapter-chip {
  font-size:0.68rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
  padding:4px 10px; border-radius:999px; background:var(--chip-bg); color:var(--chip-color);
}
.ring-wrap { position:relative; width:52px; height:52px; flex-shrink:0; }
.ring-wrap svg { width:52px; height:52px; transform:rotate(-90deg); }
.ring-track { fill:none; stroke:rgba(255,255,255,0.08); stroke-width:4; }
.ring-fill  { fill:none; stroke-width:4; stroke-linecap:round; transition:stroke-dasharray 0.8s ease; }
.ring-text  { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); }
.chapter-card h3 { font-family:'Playfair Display',serif; font-size:0.95rem; font-weight:700; line-height:1.35; color:var(--text); margin-bottom:18px; }
.card-actions { display:flex; gap:8px; flex-wrap:wrap; }
.badge-empty { opacity:0.4; }

/* Learning badge on chapter card */
.learning-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.7rem; font-weight: 600; color: var(--learning);
  background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25);
  padding: 3px 9px; border-radius: 999px; margin-bottom: 10px;
}

/* ── BUTTONS ── */
.btn {
  font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:600;
  padding:8px 16px; border-radius:10px; border:none; cursor:pointer;
  transition:all 0.15s ease; letter-spacing:0.02em;
}
.btn-primary { background:var(--accent); color:#1a1100; }
.btn-primary:hover { background:#f8d060; transform:scale(1.03); }
.btn-secondary { background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid var(--border); }
.btn-secondary:hover { background:rgba(255,255,255,0.1); color:var(--text); }
.btn-defs {
  background: rgba(37,99,235,0.15); color: #93c5fd;
  border: 1px solid rgba(37,99,235,0.35);
}
.btn-defs:hover { background: rgba(37,99,235,0.28); color: #bfdbfe; }
.btn-review {
  background: rgba(245,158,11,0.12); color: #fbbf24;
  border: 1px solid rgba(245,158,11,0.3); font-size: 0.78rem;
}
.btn-review:hover { background: rgba(245,158,11,0.22); color: #fde68a; }
.btn-large { font-size:0.9rem; padding:12px 24px; border-radius:12px; }
.btn-known {
  background:rgba(22,163,74,0.15); color:#4ade80;
  border:1px solid rgba(22,163,74,0.35);
  font-size:0.88rem; padding:13px 26px; border-radius:12px; font-weight:600; flex:1;
}
.btn-known:hover { background:rgba(22,163,74,0.28); transform:translateY(-1px); }
.btn-learning-action {
  background:rgba(245,158,11,0.12); color:#fbbf24;
  border:1px solid rgba(245,158,11,0.3);
  font-size:0.88rem; padding:13px 26px; border-radius:12px; font-weight:600; flex:1;
}
.btn-learning-action:hover { background:rgba(245,158,11,0.24); transform:translateY(-1px); }

/* Hide hero, legend, chapter grid when a session is active */
body.in-session .hero,
body.in-session .legend,
body.in-session #chapters {
  display: none !important;
}

/* ── PROGRESS TRACKER ── */
.progress-tracker {
  max-width: 680px; margin: 0 auto 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 14px 20px;
  animation: fadeUp 0.3s ease both;
}
.progress-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.progress-title { font-size:0.72rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
.progress-count { font-family:'DM Mono',monospace; font-size:0.88rem; color:var(--accent); }
.seg-bar {
  height:7px; border-radius:999px;
  background:rgba(255,255,255,0.06); overflow:hidden; display:flex;
}
.seg-known    { height:100%; background:var(--known); transition:width 0.5s ease; }
.seg-learning { height:100%; background:var(--learning); transition:width 0.5s ease; }
.seg-unseen   { height:100%; flex:1; }
.dot-strip { display:flex; flex-wrap:wrap; gap:5px; margin-top:14px; }
.dot {
  width:11px; height:11px; border-radius:50%; flex-shrink:0; cursor:default;
  transition:background 0.3s ease, transform 0.25s ease, box-shadow 0.25s ease;
}
.dot.unseen   { background:rgba(255,255,255,0.13); }
.dot.current  { background:var(--accent); transform:scale(1.5); box-shadow:0 0 8px rgba(240,192,64,0.75); }
.dot.known    { background:var(--known); }
.dot.learning { background:var(--learning); }
.progress-legend { display:flex; gap:18px; margin-top:12px; flex-wrap:wrap; }
.prog-legend-item { display:flex; align-items:center; gap:6px; font-size:0.74rem; color:var(--muted); }
.prog-legend-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ── SYNC BUTTON & MODAL ── */
.sync-btn {
  position: fixed; top: 14px; right: 14px; z-index: 50;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}
.sync-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: var(--surface2); }
#syncStatus {
  position: fixed; top: 18px; right: 60px; z-index: 50;
  font-size: 0.74rem; color: var(--muted); font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.02em; transition: opacity 0.3s ease;
  background: var(--surface); padding: 5px 12px; border-radius: 999px;
  border: 1px solid var(--border);
}
#syncStatus:empty { display: none; }
#syncStatus[data-state="ok"] { color: var(--known); }
#syncStatus[data-state="err"] { color: #f87171; }
#syncStatus[data-state="pending"] { color: var(--accent); }

#syncModal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.sync-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); }
.sync-panel {
  position: relative; z-index: 1;
  max-width: 460px; width: 100%;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px;
  animation: fadeUp 0.2s ease both;
}
.sync-panel h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 6px; }
.sync-hint { color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; line-height: 1.5; }
.sync-panel label {
  display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); margin: 12px 0 6px;
}
.sync-sublabel { text-transform: none; letter-spacing: normal; font-weight: 400; opacity: 0.7; }
.sync-panel input {
  width: 100%; padding: 11px 14px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem;
  box-sizing: border-box;
}
.sync-panel input:focus { outline: none; border-color: var(--accent); }
.sync-actions { display: flex; gap: 10px; margin-top: 18px; }
.sync-actions .btn { flex: 1; font-size: 0.82rem; padding: 10px 14px; }

/* ── FLASHCARD ── */
.fc-actions-inner {
  display: flex; gap: 12px; width: 100%; margin-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.07); padding-top: 18px;
}
.flashcard-scene {
  max-width: 680px; margin: 0 auto;
  perspective: 1400px; animation: fadeUp 0.35s ease both;
}
/* The outer wrapper sets the height so the scene has proper dimensions */
.flashcard-wrapper {
  position: relative; width: 100%;
}
.flashcard {
  position: relative; width: 100%;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.flashcard.flipped { transform: rotateX(180deg); cursor: default; }

.fc-back-question {
  font-size: 0.8rem; color: var(--muted); font-style: italic;
  margin-bottom: 14px; padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  line-height: 1.4; width: 100%;
}
/* Flashcard face: full rounded corners */
.flashcard-face {
  position: absolute; inset: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 40px;
  backface-visibility: hidden;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center;
}
.flashcard-back {
  transform: rotateX(180deg);
  background: var(--surface2); border-color: rgba(255,255,255,0.1);
  justify-content: flex-start; align-items: flex-start; text-align: left;
}
/* Sizer divs: position absolute so they don't take layout space */
.fc-sizer { visibility: hidden; padding: 40px; pointer-events: none; position: absolute; top: 0; left: 0; right: 0; }
.fc-sizer-front { display:flex; flex-direction:column; align-items:center; text-align:center; }
.fc-sizer-back  { display:flex; flex-direction:column; align-items:flex-start; text-align:left; }

.fc-label { font-size:0.7rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:20px; }
.fc-question { font-family:'Playfair Display',serif; font-size:clamp(1.05rem,2.5vw,1.4rem); line-height:1.45; color:var(--text); }
.fc-hint {
  margin-top:24px; font-size:0.78rem; color:var(--muted);
  display:flex; align-items:center; gap:6px;
  border:1px dashed rgba(255,255,255,0.12); padding:7px 14px; border-radius:999px;
}
.fc-answer-label { font-size:0.7rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; }
.fc-answer-list { list-style:none; width:100%; }
.fc-answer-list li {
  padding:10px 16px; border-radius:11px;
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  margin-bottom:8px; font-size:0.92rem; line-height:1.5; color:var(--text);
  display:flex; align-items:flex-start; gap:10px;
}
.fc-answer-list li::before { content:'›'; color:var(--accent); font-weight:700; flex-shrink:0; font-size:1.1rem; line-height:1.4; }

/* ── QCM ── */
.q-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:24px; padding:32px; max-width:680px; margin:0 auto;
  animation:fadeUp 0.35s ease both;
}
.q-counter { font-size:0.72rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.q-card h3 { font-family:'Playfair Display',serif; font-size:1.25rem; line-height:1.4; margin-bottom:24px; color:var(--text); }
.qcm-choice {
  width:100%; text-align:left; display:block;
  padding:12px 16px; border-radius:12px;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:400;
  cursor:pointer; transition:all 0.15s ease; margin-top:10px;
}
.qcm-choice:hover { border-color:rgba(240,192,64,0.4); background:rgba(240,192,64,0.05); }
.qcm-choice.active { border-color:var(--accent); background:rgba(240,192,64,0.1); color:var(--accent); font-weight:600; }
.q-actions { display:flex; gap:10px; margin-top:22px; }

/* ── RECAP ── */
.recap-header { text-align:center; max-width:680px; margin:0 auto 28px; animation:fadeUp 0.3s ease both; }
.recap-header h2 { font-family:'Playfair Display',serif; font-size:2rem; margin-top:16px; margin-bottom:6px; }
.score-display { font-family:'DM Mono',monospace; font-size:3rem; font-weight:500; color:var(--accent); line-height:1; }
.recap-item {
  max-width:680px; margin:0 auto 10px; padding:14px 18px;
  border-radius:14px; background:var(--surface); border:1px solid var(--border); border-left-width:4px;
  font-size:0.88rem; animation:fadeUp 0.3s ease both;
}
.recap-item.ok { border-left-color:var(--known); }
.recap-item.ko { border-left-color:var(--eco); }
.recap-item .recap-q { font-weight:500; margin-bottom:4px; }
.recap-item .recap-correction { color:var(--muted); font-size:0.82rem; margin-top:6px; }
.recap-item .recap-correction strong { color:#f87171; }

/* ── DETAILS ── */
.details-card {
  max-width:640px; margin:0 auto;
  background:var(--surface); border:1px solid var(--border);
  border-radius:24px; padding:32px; animation:fadeUp 0.3s ease both;
}
.details-card h2 { font-family:'Playfair Display',serif; font-size:1.4rem; margin-bottom:8px; }

/* ── DEFS ── */
.def-choices-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.def-choice {
  text-align:center; padding:12px 14px; border-radius:12px; font-size:0.82rem; font-weight:500;
  background:var(--surface2); border:1px solid var(--border); color:var(--text); cursor:pointer; transition:all 0.15s;
}
.def-choice:hover { border-color:rgba(240,192,64,0.4); background:rgba(240,192,64,0.06); }
.def-definition {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:14px; padding:18px 20px;
  font-size:1rem; font-style:italic; color:#c4bfdb; margin-bottom:22px; line-height:1.6;
}

/* ── BACK HOME (inside tracker header) ── */
.session-back-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 600;
  color: var(--muted); background: transparent; border: none; padding: 0;
  cursor: pointer; transition: color 0.15s ease; letter-spacing: 0.02em;
}
.session-back-btn:hover { color: var(--text); }
.session-nav { display: none; } /* hidden — back btn lives inside tracker now */

/* ── EMPTY STATE ── */
.empty-state {
  max-width:480px; margin:60px auto; text-align:center;
  background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:40px;
  animation:fadeUp 0.3s ease both;
}
.empty-state .icon { font-size:2.5rem; margin-bottom:16px; }
.empty-state h3 { font-family:'Playfair Display',serif; font-size:1.3rem; margin-bottom:10px; }
.empty-state p { color:var(--muted); line-height:1.6; margin-bottom:24px; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.grid .chapter-card:nth-child(1){animation-delay:.05s}
.grid .chapter-card:nth-child(2){animation-delay:.10s}
.grid .chapter-card:nth-child(3){animation-delay:.15s}
.grid .chapter-card:nth-child(4){animation-delay:.20s}
.grid .chapter-card:nth-child(5){animation-delay:.25s}
.grid .chapter-card:nth-child(6){animation-delay:.30s}
.grid .chapter-card:nth-child(7){animation-delay:.35s}
.grid .chapter-card:nth-child(8){animation-delay:.40s}
.grid .chapter-card:nth-child(9){animation-delay:.45s}
</style>
</head>
<body>
<button class="sync-btn" onclick="openSyncSettings()" title="Synchronisation">⚙</button>
<div id="syncStatus"></div>
<div id="app">
  <div class="hero">
    <div class="hero-eyebrow">Terminale SES</div>
    <h1>Réviser en s'entraînant</h1>
    <p>Choisis un chapitre pour commencer ta session</p>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot socio"></div> Sociologie</div>
    <div class="legend-item"><div class="legend-dot eco"></div> Économie</div>
    <div class="legend-item"><div class="legend-dot cross"></div> Regards croisés</div>
  </div>
  <div id="chapters" class="grid"></div>
  <div id="content"></div>
</div>

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let currentChapter=null, questionIndex=0, defIndex=0;
let selectedChoices=[];
let mode='questions';         // 'questions' | 'defs'
let reviewMode=false;         // true = only 'learning' questions
let allQuestions=[], defQuestions=[], answersLog=[];
let session={success:0,total:0};
// Per-question status: 'unseen'|'known'|'learning'
// Stored in localStorage per chapter
let questionStatus=[];
let defStatus=[];
let isFlipped=false;

const records = JSON.parse(localStorage.getItem('records')||'{}');
const statusStore = JSON.parse(localStorage.getItem('statusStore')||'{}');

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
const chapters={
  engagement:{
    number:"Chapitre 1",type:"socio",
    title:"Comment expliquer l'engagement politique dans les sociétés démocratiques ?",
    details:"Comprendre les formes, les raisons et les transformations de l'engagement politique.",
    questions:[
      {q:"Présente les quatre formes de l'engagement politique.",expected:[["le vote"],["l'engagement associatif"],["le militantisme"],["la consommation engagée"]]},
      {q:"Distingue les formes conventionnelles et non conventionnelles de l'engagement politique.",expected:[["Conventionnelles : formes instituées comme le vote et les meetings politiques"],["Non-conventionnelles : actions protestataires légales ou illégales comme les grèves ou les blocages"]]},
      {q:"Explique le paradoxe de l'action collective.",expected:[["Tous les individus ont intérêt à se mobiliser, mais chacun préfère profiter des efforts des autres (passagers clandestins), ce qui aboutit à une absence de mobilisation"]]},
      {q:"Explique le calcul coût-avantage qui conduit au comportement de passager clandestin.",expected:[["Les coûts de l'engagement sont certains (financiers, danger, temps) alors que les avantages sont incertains (succès de l'action), ce qui incite les individus à ne pas participer"]]},
      {q:"Présente les trois raisons qui poussent les individus à s'engager malgré le paradoxe.",expected:[["les incitations sélectives : récompenses matérielles ou sanctions pour les participants"],["les rétributions symboliques : récompenses non matérielles comme le sentiment d'utilité ou les rencontres"],["la structure des opportunités politiques : contexte politique et juridique favorable"]]},
      {q:"Présente les quatre éléments de la structure des opportunités politiques.",expected:[["le degré d'ouverture du système politique"],["le degré de stabilité du régime politique"],["le relais dont dispose le groupe mobilisé au sein du pouvoir"],["la capacité du gouvernement à répondre à l'action collective"]]},
      {q:"Comment la CSP et le diplôme influencent-ils l'engagement politique ?",expected:[["Les cadres et les plus diplômés sont les plus engagés politiquement, car ils disposent de davantage de capital économique, culturel et social"]]},
      {q:"Distingue l'effet d'âge et l'effet de génération sur l'engagement politique.",expected:[["L'effet d'âge est lié à la position dans le cycle de vie : les jeunes sont plus protestataires"],["L'effet de génération est lié aux événements vécus en commun : méfiance envers les représentants, usage des réseaux sociaux, engagement de court terme"]]},
      {q:"Présente les différences d'engagement politique entre hommes et femmes.",expected:[["Il n'y a pas de différence au niveau du vote mais les hommes sont plus présents dans les actions protestataires et les postes à responsabilité"],["Les hommes et les femmes ne s'engagent pas pour les mêmes thèmes de revendications"]]},
      {q:"Présente les trois objets de l'action collective.",expected:[["les conflits liés au travail (syndicats contre direction)"],["les luttes minoritaires (droits des minorités comme #MeToo)"],["les nouveaux enjeux de mobilisation (environnement, pauvreté, politique)"]]},
      {q:"Explique l'évolution des objets de l'action collective selon le développement économique.",expected:[["Dans les pays en développement, les revendications portent sur des valeurs matérialistes (salaire, logement)"],["Dans les pays développés, elles portent sur des valeurs post-matérialistes (droits, environnement)"]]},
      {q:"Présente les quatre acteurs de l'action collective.",expected:[["les adhérents aux partis politiques"],["les membres des syndicats"],["les membres des associations"],["les groupements de personnes (Gilets Jaunes, BLM, #MeToo)"]]},
      {q:"Présente l'évolution des acteurs de l'action collective.",expected:[["Il y a une baisse de l'importance des acteurs traditionnels (partis politiques et syndicats) et une hausse des groupements de personnes"]]},
      {q:"Présente les répertoires d'action collective et leur diversité.",expected:[["les manifestations et grèves"],["les actions choc et médiatiques"],["le non-respect de la loi avec ou sans violence"],["les pétitions et le vote"]]},
    ],
    defs:{
      "Société démocratique":"Société dans laquelle le pouvoir est exercé par les citoyens, qui peuvent influencer les décisions politiques au niveau local, national ou mondial.",
      "Engagement politique":"Ensemble des actions visant à influencer la démocratie au niveau local, national ou mondial.",
      "Vote":"Forme conventionnelle d'engagement politique qui consiste à participer à une élection ou à un référendum, y compris par le vote blanc ou l'abstention.",
      "Engagement associatif":"Forme d'engagement qui consiste à être bénévole dans une association pour aider les autres ou faire évoluer la société.",
      "Militantisme":"Forme d'engagement politique active consistant à lutter pour défendre une cause.",
      "Consommation engagée":"Utilisation de sa consommation pour mettre en avant ses convictions, en boycottant certains produits ou en en achetant d'autres volontairement.",
      "Action collective":"Action commune menée par un groupe d'individus qui partagent un objectif (exemple : une manifestation).",
      "Passager clandestin":"Individu qui profite des bénéfices d'une action collective sans y participer, faisant un calcul coût-avantage défavorable à l'engagement.",
      "Incitation sélective":"Récompense financière ou matérielle accordée aux participants d'une action collective ou sanction pour ceux qui ne participent pas.",
      "Rétribution symbolique":"Récompense non matérielle à la participation : sentiment d'utilité, rencontres, développement de son réseau, défense de ses valeurs.",
      "Structure des opportunités politiques":"Contexte politique et juridique d'un pays qui influence la facilité de mener une action collective (ouverture du système, stabilité du régime, relais au pouvoir, capacité de réponse du gouvernement).",
      "Objet":"Thème des revendications portées par une action collective : conflits du travail, luttes minoritaires ou nouveaux enjeux.",
      "Acteur":"Catégorie d'individus ou d'organisations menant l'action collective : partis politiques, syndicats, associations ou groupements de personnes.",
      "Répertoire de l'action politique":"Ensemble des moyens d'action à la disposition des contestataires à chaque époque et en chaque lieu (manifestations, grèves, actions choc, pétitions, non-respect de la loi)."
    }
  },
  croissance:{
    number:"Chapitre 2",type:"eco",
    title:"Quels sont les sources et les défis de la croissance économique ?",
    details:"Comprendre les sources de la croissance et ses défis écologiques et sociaux.",
    questions:[
      {q:"Présente le processus historique de la croissance économique en six étapes.",expected:[["avant le XVIIIe siècle : pas de croissance (famines, maladies, guerres)"],["1820-1870 : décollage de la croissance (révolution industrielle)"],["1870-1913 : élargissement à plusieurs pays"],["1913-1945 : ralentissement (guerres)"],["1945-1970 : forte accélération"],["1970-2025 : stagnation (crises, chômage)"]]},
      {q:"Comment mesure-t-on la croissance économique et comment calcule-t-on le taux de croissance ?",expected:[["La croissance est mesurée par le PIB, somme des valeurs ajoutées dans un pays"],["Le taux de croissance correspond à la variation en pourcentage du PIB entre deux dates"]]},
      {q:"Quels sont les deux facteurs de production ?",expected:[["le facteur travail : nombre de travailleurs et heures travaillées"],["le facteur capital : machines, bâtiments, outils"]]},
      {q:"Quelles sont les deux sources de la croissance économique ?",expected:[["l'accumulation des facteurs de production (croissance extensive : augmenter la quantité des facteurs)"],["l'accroissement de la PGF (croissance intensive : augmenter l'efficacité des facteurs)"]]},
      {q:"Explique pourquoi la croissance extensive a des limites selon la loi de Ricardo.",expected:[["La loi des rendements décroissants de Ricardo montre que la production stagne si on augmente un seul facteur de production, ce qui empêche une croissance extensive indéfinie"]]},
      {q:"Comment le progrès technique permet-il des gains de productivité ?",expected:[["Une invention devient une innovation quand elle est utilisée dans le processus de production"],["L'innovation transforme le processus de production et améliore la PGF, permettant de produire davantage sans augmenter les facteurs"]]},
      {q:"Pourquoi le progrès technique est-il dit endogène ?",expected:[["Le progrès technique est lié aux investissements des agents économiques dans quatre domaines : capital physique, recherche et développement, capital humain (éducation, santé) et infrastructures publiques"]]},
      {q:"Explique pourquoi la croissance économique est un processus auto-entretenu.",expected:[["Seuls les pays riches disposent des ressources pour investir dans les sources de croissance, ce qui leur permet de s'enrichir encore davantage grâce aux rendements croissants de l'innovation"]]},
      {q:"Quel est le rôle des institutions dans la croissance économique ?",expected:[["Les institutions représentent les règles formelles et informelles qui encadrent les échanges, elles apportent de la confiance et favorisent les échanges"],["Plus les institutions sont de qualité, plus la richesse est importante"]]},
      {q:"Explique les deux incitations créées par les droits de propriété.",expected:[["Incitation à innover : les agents n'ont plus peur de se faire voler grâce aux droits de propriété et aux brevets"],["Incitation à investir : la sécurité accordée par les institutions favorise les investissements"]]},
      {q:"Présente le processus de destruction créatrice.",expected:[["L'innovation crée de nouveaux produits, emplois et entreprises"],["Elle détruit simultanément les anciens produits, entreprises et emplois devenus obsolètes (exemple : streaming vs cinéma et DVD)"]]},
      {q:"Présente les deux effets du progrès technique sur les inégalités de revenus.",expected:[["Les entreprises innovantes versent des salaires plus élevés aux salariés qualifiés, créant des inégalités de revenus"],["Le progrès technique a un effet biaisé : il profite surtout aux qualifiés, crée des emplois qualifiés et détruit des emplois routiniers, provoquant une polarisation de l'emploi"]]},
      {q:"Présente les trois limites écologiques à la croissance soutenable.",expected:[["l'épuisement des ressources naturelles (empreinte écologique, jour de dépassement)"],["l'accélération de la pollution (air, sol, eau)"],["l'accélération du réchauffement climatique (dérèglements, catastrophes naturelles)"]]},
      {q:"Distingue soutenabilité faible et soutenabilité forte.",expected:[["Soutenabilité faible : on peut remplacer le capital naturel par le progrès technique, donc la croissance est soutenable"],["Soutenabilité forte : le capital naturel ne peut pas être remplacé, il faut donc le préserver"]]},
      {q:"Comment le progrès technique peut-il permettre une croissance soutenable ?",expected:[["L'innovation peut solutionner l'épuisement des ressources par les énergies renouvelables, réduire la pollution par des transports moins polluants et contenir le réchauffement climatique par des innovations de captage du CO2"]]},
    ],
    defs:{
      "Croissance économique":"Augmentation durable de la production de biens et de services dans un pays.",
      "PIB":"Somme des valeurs ajoutées produites dans un pays, indicateur de la croissance économique.",
      "Taux de croissance économique":"Variation en pourcentage du PIB entre deux dates.",
      "Facteurs de production":"Éléments nécessaires à la production : le travail (travailleurs, heures) et le capital (machines, bâtiments).",
      "Croissance extensive":"Croissance obtenue par l'augmentation de la quantité des facteurs de production.",
      "Croissance intensive":"Croissance obtenue par l'amélioration de l'efficacité des facteurs de production grâce au progrès technique.",
      "Productivité globale des facteurs":"Efficacité combinée du travail et du capital dans le processus de production.",
      "Progrès technique":"Amélioration des technologies et des conditions de production résultant de l'innovation.",
      "Gains de productivité":"Capacité à produire davantage sans augmenter la quantité des facteurs, grâce au progrès technique.",
      "Innovation":"Utilisation d'une invention dans le processus de production (innovation de produit ou de procédé).",
      "Endogène":"Qualifie ce qui est lié au fonctionnement interne de l'économie : le progrès technique est endogène car il résulte des investissements des agents économiques.",
      "Institution":"Ensemble des règles formelles et informelles qui encadrent les interactions entre individus et les échanges sur un marché.",
      "Droits de propriété":"Reconnaissance accordée à un individu qui possède un bien : droit de l'utiliser, le modifier, le vendre ou le louer.",
      "Croissance soutenable":"Croissance qui permet de satisfaire les besoins du présent sans compromettre la capacité des générations futures à satisfaire les leurs.",
      "Limites écologiques":"Contraintes environnementales qui pèsent sur la croissance : l'épuisement des ressources naturelles, l'accélération de la pollution et du réchauffement climatique."
    }
  },
  structure:{
    number:"Chapitre 3",type:"socio",
    title:"Comment est structurée la société française actuelle ?",
    details:"Analyser la structuration de l'espace social, les évolutions socioprofessionnelles et le débat sur les classes sociales.",
    questions:[
      {q:"Distingue la structuration et la hiérarchisation de l'espace social.",expected:[["La structuration consiste à regrouper des individus qui ont des ressemblances selon un critère commun"],["La hiérarchisation consiste à classer ces groupes selon une position supérieure ou inférieure"]]},
      {q:"Présente les trois facteurs socio-économiques de l'espace social.",expected:[["la catégorie socioprofessionnelle : regroupe selon le métier, la qualification, le statut"],["le revenu : rémunération du travail et du capital qui influence le niveau de vie"],["le diplôme : reconnaissance de la qualification qui influence le chômage et les conditions d'emploi"]]},
      {q:"Présente les quatre facteurs socio-démographiques de l'espace social.",expected:[["la composition du ménage (type de couple, présence d'enfants)"],["la position dans le cycle de vie (enfance, jeunesse, vie adulte, retraite)"],["le sexe (rôles masculins et féminins, plafond de verre)"],["le lieu de résidence (campagne vs zones urbaines, accès aux services)"]]},
      {q:"Présente les quatre évolutions de la structure socioprofessionnelle française.",expected:[["la salarisation : augmentation de la part des salariés et diminution des indépendants"],["la tertiarisation : augmentation du secteur des services au détriment des secteurs primaire et secondaire"],["la qualification : hausse du niveau de diplôme et des compétences requises"],["la féminisation : augmentation de la part des femmes dans l'emploi"]]},
      {q:"Explique les raisons de la salarisation.",expected:[["La sécurité du statut de salarié (santé, salaire garanti, retraite) et le développement de la grande distribution qui a détruit les petits commerces"]]},
      {q:"Explique les raisons de la tertiarisation.",expected:[["Le développement économique a augmenté le pouvoir d'achat et la consommation de loisirs, le vieillissement de la population a accru les besoins de santé, et le progrès technique a détruit des emplois ouvriers et agricoles"]]},
      {q:"Présente les deux raisons de la féminisation de l'emploi.",expected:[["L'émancipation des femmes par rapport à leur rôle traditionnel de mère grâce à la contraception"],["La tertiarisation de la société qui a ouvert aux femmes des emplois dans le secteur social et des services"]]},
      {q:"Présente la théorie des classes sociales selon Marx.",expected:[["La classe en soi : caractéristiques économiques communes (possession des facteurs de production)"],["La classe pour soi : conscience d'appartenir à cette classe et d'être exploité"],["La lutte des classes : mobilisation pour défendre les intérêts communs, devant mener au communisme"]]},
      {q:"Présente la théorie de la stratification sociale de Max Weber.",expected:[["Weber prend en compte trois dimensions : économique (richesse → classe sociale), politique (pouvoir → parti), sociale (prestige → groupe de statut)"]]},
      {q:"Explique la principale différence entre Marx et Weber.",expected:[["Marx analyse la société selon une seule dimension économique, Weber adopte une vision multidimensionnelle avec trois critères : économique, politique et social"]]},
      {q:"Présente les trois capitaux selon Bourdieu et les trois classes sociales qui en découlent.",expected:[["Les trois capitaux : culturel (diplômes, connaissances), économique (richesse) et social (réseau)"],["Les trois classes : dominante (aisée), moyenne et dominée (populaire)"]]},
      {q:"Présente les trois arguments qui remettent en cause la pertinence des classes sociales.",expected:[["La moyennisation : de plus en plus d'individus appartiennent à la classe moyenne depuis les années 60-70"],["La hausse des distances intra-classes : les écarts au sein d'un même groupe augmentent"],["L'affaiblissement de l'identification subjective : les individus s'identifient moins à leur profession en raison de l'individualisation"]]},
      {q:"Explique pourquoi les classes sociales n'ont pas totalement disparu.",expected:[["La hausse des distances inter-classes : les inégalités économiques augmentent depuis 40 ans au profit des très hauts revenus"],["Le renforcement des élites (top 0,01%, très haute bourgeoisie avec entre-soi fort)"],["L'émergence d'une nouvelle classe populaire précaire (ouvriers et employés en CDD, chômage, faibles diplômes)"]]},
      {q:"Explique l'individualisation et son effet sur les classes sociales.",expected:[["L'individualisation est un processus où l'individu devient plus autonome et indépendant des groupes auxquels il appartient, ce qui affaiblit l'identité collective et l'appartenance à une classe sociale"]]},
    ],
    defs:{
      "Espace social":"Description de la société basée sur les points communs et les différences entre les individus et les groupes.",
      "Structuration":"Regroupement d'individus dans l'espace social qui ont des ressemblances selon un critère commun.",
      "Hiérarchisation":"Classement des groupes dans l'espace social selon une position supérieure ou inférieure.",
      "Catégorie socioprofessionnelle":"Classement des individus selon leur métier, qualification, position hiérarchique et statut (6 CSP : ouvriers, employés, CPIS, PI, ACCE, agriculteurs).",
      "Structure socioprofessionnelle":"Répartition des actifs dans les différentes CSP.",

      "Féminisation":"Augmentation de la part des femmes dans l'emploi.",
      "Classes sociales":"Groupes hiérarchisés partageant des caractéristiques communes, définis selon des critères économiques, sociaux et culturels.",
      "Stratification sociale":"Hiérarchie de la société fondée sur plusieurs critères : économique, politique et social (Weber).",
      "Distance inter-classes":"Écarts entre individus appartenant à des groupes sociaux différents.",
      "Distance intra-classes":"Écarts entre individus appartenant au même groupe social.",
      "Individualisation":"Processus par lequel l'individu devient plus autonome et indépendant des groupes auxquels il appartient.",
      "Identification subjective":"Sentiment d'appartenance à un groupe social lié à un métier ou une position.",
      "Rapports sociaux de genre":"Façon dont la société crée et reproduit les rôles masculins et féminins, source d'inégalités."
    }

  commerce:{
    number:"Chapitre 4",type:"eco",
    title:"Quels sont les fondements du commerce international et de l'internationalisation de la production ?",
    details:"Comprendre les mécanismes des échanges internationaux, la compétitivité et les débats libre-échange/protectionnisme.",
    questions:[
      {q:"Présente les deux types d'échanges commerciaux au XXIe siècle.",expected:[["Le commerce interbranche entre pays différents : exploitation des avantages comparatifs de chaque pays"],["Le commerce intrabranche entre pays comparables : échange de produits du même secteur (représente 50% du commerce international)"]]},
      {q:"Explique la théorie de l'avantage comparatif de Ricardo.",expected:[["Selon Ricardo, un pays doit se spécialiser dans le domaine où sa supériorité est la plus grande, ou si aucune supériorité, dans le domaine où son infériorité est la moins importante (là où il est le moins mauvais)"]]},
      {q:"Compare la théorie de l'avantage absolu (Adam Smith) et l'avantage comparatif (Ricardo).",expected:[["Adam Smith : un pays se spécialise dans les productions où il est le plus efficace, mais cette théorie est incomplète car certains pays n'auraient aucun avantage absolu"],["Ricardo : tout pays doit se spécialiser dans son avantage comparatif, même sans supériorité absolue, ce qui augmente la production mondiale"]]},
      {q:"Qu'est-ce qu'une dotation factorielle et comment explique-t-elle les avantages comparatifs ?",expected:[["La dotation factorielle correspond à la quantité de facteurs de production disponibles dans un pays (travailleurs qualifiés ou peu qualifiés, capital)"],["Un pays se spécialise dans les produits qui nécessitent les facteurs qu'il possède en grande quantité"]]},
      {q:"Comment expliquer les échanges entre pays comparables par la différenciation des produits ?",expected:[["La différenciation par la qualité (verticale) permet de distinguer un produit haut de gamme d'un autre"],["La différenciation par les caractéristiques (horizontale) répond au goût pour la diversité des consommateurs"]]},
      {q:"Explique le rôle de la fragmentation de la chaîne de valeur dans le commerce international.",expected:[["La chaîne de valeur regroupe toutes les étapes de fabrication d'un bien (conception, assemblage, livraison)"],["Sa fragmentation signifie que ces étapes sont réparties dans différents pays selon leurs avantages comparatifs, générant du commerce de biens intermédiaires"]]},
      {q:"Explique pourquoi la compétitivité d'un pays dépend de la productivité de ses entreprises.",expected:[["La compétitivité des pays dépend des entreprises qui provient de leur productivité"],["Seules les grandes entreprises, les plus productives, sont capables de supporter les coûts spécifiques du commerce international et d'exporter"]]},
      {q:"Présente les deux types de compétitivité.",expected:[["La compétitivité prix : proposer un prix faible et attractif"],["La compétitivité hors-prix : proposer un produit de qualité différent des concurrents (délai, notoriété, qualité)"]]},
      {q:"Présente les deux stratégies des firmes pour internationaliser leur chaîne de valeur.",expected:[["La sous-traitance : confier une étape de production à une entreprise étrangère"],["L'investissement direct à l'étranger (IDE) : acheter une entreprise étrangère ou en construire une nouvelle"]]},
      {q:"Présente les trois effets du commerce international.",expected:[["Des gains pour les consommateurs : prix plus faibles et plus de diversité et de qualité"],["Une baisse des inégalités entre les pays : le commerce crée des emplois dans les pays pauvres qui peuvent monter en gamme"],["Une hausse des inégalités de revenus au sein de chaque pays : polarisation emplois entre gagnants et perdants de la mondialisation"]]},
      {q:"Présente les avantages et les limites du libre-échange.",expected:[["Avantages : gains pour les consommateurs (prix, diversité) et baisse des inégalités entre les pays"],["Limites : hausse des inégalités internes, impact environnemental, concurrence déloyale, dépendance pour des produits stratégiques"]]},
      {q:"Présente les quatre arguments qui justifient le protectionnisme.",expected:[["Protéger les emplois en concurrence avec les importations"],["Développer la sécurité nationale en protégeant les secteurs stratégiques"],["Assurer la sécurité alimentaire"],["Se protéger du dumping (concurrence déloyale)"]]},
      {q:"Explique le risque de guerre commerciale.",expected:[["Une guerre commerciale survient quand des pays répliquent aux barrières douanières de leurs partenaires en imposant leurs propres taxes, ce qui augmente les prix pour les consommateurs et nuit aux exportateurs des deux côtés"]]},
    ],
    defs:{
      "Commerce international":"Ensemble des échanges de biens et services entre différents pays.",
      "Spécialisation internationale":"Concentration des capacités de production d'un pays dans des domaines destinés à l'exportation.",
      "Avantage comparatif":"Domaine dans lequel la supériorité d'un pays en termes de coûts de production est la plus importante, ou son infériorité la moins importante (Ricardo).",
      "Dotation factorielle":"Quantité et qualité des facteurs de production disponibles dans un pays (travailleurs qualifiés, capital).",
      "Dotation technologique":"Niveau de technologies, de brevets et de capital humain d'un pays, qui contribue à la formation de ses avantages comparatifs.",
      "Différenciation des produits":"Stratégie des entreprises visant à distinguer leurs produits de la concurrence, soit par la qualité (verticale), soit par les caractéristiques (horizontale).",
      "Chaîne de valeur":"Ensemble des étapes nécessaires à la fabrication d'un bien : conception, assemblage, livraison, SAV.",
      "Fragmentation de la chaîne de valeur":"Répartition des étapes de production dans différents pays selon leurs avantages comparatifs.",
      "Productivité":"Efficacité avec laquelle une entreprise ou un pays utilise ses facteurs de production : elle détermine la compétitivité.",
      "Compétitivité":"Capacité d'un pays à faire mieux que les autres et donc à exporter davantage (compétitivité prix ou hors-prix).",
      "Firmes":"Très grandes entreprises localisées dans plusieurs pays, les plus productives, à l'origine de l'internationalisation de la production.",
      "Internationalisation de la chaîne de valeur":"Répartition des différentes étapes de production d'un bien dans plusieurs pays à travers le monde (tendance depuis les années 1980).",
      "Libre-échange":"Politique commerciale favorisant le commerce international et l'internationalisation de la production en supprimant les barrières.",
      "Protectionnisme":"Politique de mise en place de barrières (tarifaires ou non tarifaires) pour limiter les importations et protéger les entreprises nationales."
    }
  },
  mobilite:{

/* ═══════════════════════════════════════
   CLOUD SYNC (GitHub Gist)
═══════════════════════════════════════ */
let syncTimer=null;
let syncInFlight=false;

function getSyncConfig(){
  return {
    token: localStorage.getItem('gistToken')||'',
    gistId: localStorage.getItem('gistId')||''
  };
}

function setSyncConfig(token, gistId){
  localStorage.setItem('gistToken', token);
  localStorage.setItem('gistId', gistId);
}

function setSyncStatus(text, state){
  const el=document.getElementById('syncStatus');
  if(!el) return;
  el.textContent=text;
  el.dataset.state=state||'';
}

/* Debounced push: waits 2s after last change before pushing */
function scheduleCloudSync(){
  const cfg=getSyncConfig();
  if(!cfg.token||!cfg.gistId) return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushCloudSync, 2000);
}

async function pushCloudSync(){
  const cfg=getSyncConfig();
  if(!cfg.token||!cfg.gistId||syncInFlight) return;
  syncInFlight=true;
  setSyncStatus('Synchronisation…','pending');
  try{
    const body={
      files:{
        'ses-progress.json':{
          content: JSON.stringify({records, statusStore, updatedAt: Date.now()}, null, 2)
        }
      }
    };
    const res=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{
      method:'PATCH',
      headers:{
        'Authorization':`token ${cfg.token}`,
        'Accept':'application/vnd.github+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    setSyncStatus('✓ Synchronisé','ok');
    setTimeout(()=>setSyncStatus('',''), 2500);
  }catch(err){
    setSyncStatus('⚠ Erreur de sync','err');
    console.error('Sync push failed:', err);
  }finally{
    syncInFlight=false;
  }
}

async function pullCloudSync(){
  const cfg=getSyncConfig();
  if(!cfg.token||!cfg.gistId) return false;
  setSyncStatus('Chargement…','pending');
  try{
    const res=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{
      headers:{
        'Authorization':`token ${cfg.token}`,
        'Accept':'application/vnd.github+json'
      }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const file=data.files && data.files['ses-progress.json'];
    if(!file||!file.content||file.content.trim()==='{}'||file.content.trim()===''){
      setSyncStatus('✓ Prêt','ok');
      setTimeout(()=>setSyncStatus('',''), 2000);
      return false;
    }
    const parsed=JSON.parse(file.content);
    if(parsed.records){
      Object.keys(parsed.records).forEach(k=>{ records[k]=parsed.records[k]; });
    }
    if(parsed.statusStore){
      Object.keys(parsed.statusStore).forEach(k=>{ statusStore[k]=parsed.statusStore[k]; });
    }
    ensureChapterDefaults();
    localStorage.setItem('records', JSON.stringify(records));
    localStorage.setItem('statusStore', JSON.stringify(statusStore));
    setSyncStatus('✓ Chargé','ok');
    setTimeout(()=>setSyncStatus('',''), 2000);
    return true;
  }catch(err){
    setSyncStatus('⚠ Erreur','err');
    console.error('Sync pull failed:', err);
    return false;
  }
}

function openSyncSettings(){
  const cfg=getSyncConfig();
  const modal=document.createElement('div');
  modal.id='syncModal';
  modal.innerHTML=`
    <div class="sync-overlay" onclick="closeSyncSettings()"></div>
    <div class="sync-panel">

function closeSyncSettings(){

async function saveSyncSettings(thenPull){
  const token=document.getElementById('syncTokenInput').value.trim();
  const gistId=document.getElementById('syncGistIdInput').value.trim();
  setSyncConfig(token, gistId);
  closeSyncSettings();
  if(thenPull && token && gistId){
    const loaded=await pullCloudSync();
    if(loaded) renderChapters();
  }

async function forceSyncPush(){
  closeSyncSettings();

}

function clearSyncSettings(){
  localStorage.removeItem('gistToken');
  localStorage.removeItem('gistId');
  closeSyncSettings();
  setSyncStatus('Déconnecté','');
  setTimeout(()=>setSyncStatus('',''), 2000);
}

/* ── Fisher-Yates shuffle ── */
function shuffle(arr){ 
  const a=[...arr]; 
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } 
  return a; 
}

function getLearningCount(id, type){
  const stored = statusStore[id];
  if(!stored) return 0;
  const arr = type==='q' ? stored.q : stored.d;
  return arr.filter(s=>s==='learning').length;
}

function renderChapters(){
  ensureChapterDefaults();
  chaptersDiv.innerHTML='';
  Object.keys(chapters).forEach(id=>{
    const c=chapters[id];
    const total=c.questions.length+Object.keys(c.defs).length;
    const best=(records[id] && records[id].best) || 0;
    const percent=total?Math.round((best/total)*100):0;
    const isEmpty=total===0;
    const typeColor=c.type==='socio'?'#2563eb':c.type==='eco'?'#dc2626':'#7c3aed';

    const qLearning=getLearningCount(id,'q');
    const dLearning=getLearningCount(id,'d');
    const hasLearning=(qLearning+dLearning)>0;

    const card=document.createElement('div');
    card.className=`chapter-card ${c.type}${isEmpty?' badge-empty':''}`;

    let learningBadge='';
    if(hasLearning) learningBadge=`<div class="learning-badge">⏳ ${qLearning+dLearning} en cours</div>`;

    card.innerHTML=`
      <div class="card-top">
        <span class="chapter-chip">${c.number}</span>
        <div class="ring-wrap">
          <svg viewBox="0 0 36 36">
            <circle class="ring-track" cx="18" cy="18" r="15.9"/>
            <circle class="ring-fill" cx="18" cy="18" r="15.9"
              stroke-dasharray="${percent},100" style="stroke:${typeColor}"/>
          </svg>
          <div class="ring-text">${best}/${total}</div>
        </div>
      </div>
      ${learningBadge}
      <h3>${c.title}</h3>
      <div class="card-actions">
        ${total>0 ? `
          <button class="btn btn-primary" onclick="startQuestions('${id}',false)">Questions</button>
          <button class="btn btn-defs" onclick="startDefs('${id}',false)">Définitions</button>
          ${qLearning>0 ? `<button class="btn btn-review" onclick="startQuestions('${id}',true)" title="Réviser uniquement les questions en cours d'apprentissage">⏳ Réviser</button>` : ''}
        ` : `<span style="font-size:0.78rem;color:var(--muted);font-style:italic">À compléter</span>`}
        <button class="btn btn-secondary" onclick="showDetails('${id}')">Détails</button>
      </div>`;
    chaptersDiv.appendChild(card);
  });
}

   QUESTIONS SESSION
═══════════════════════════════════════ */
function startQuestions(id, onlyLearning){
  mode='questions'; currentChapter=id; reviewMode=!!onlyLearning;
  answersLog=[]; isFlipped=false;

  // Load saved statuses
  const saved=statusStore[id].q;
  const raw=chapters[id].questions;
  // Pair each question with its stored status
  let pairs=raw.map((q,i)=>({q, origIndex:i, status: saved[i]||'unseen'}));

  if(onlyLearning){
    pairs=pairs.filter(p=>p.status==='learning');
    if(pairs.length===0){
      showEmptyLearning(); return;
    }
  }

  // Shuffle
  pairs=shuffle(pairs);

  allQuestions=pairs.map(p=>p.q);
  // We'll track statuses separately in the session
  questionStatus=pairs.map(p=>p.status);
  // origIndexes to write back statuses
  const origIndexes=pairs.map(p=>p.origIndex);
  window._origIndexes=origIndexes;

  session={success:0,total:allQuestions.length};
  questionIndex=0;
  chaptersDiv.style.display='none';
  document.body.classList.add('in-session');
  showQuestion();
}

function showEmptyLearning(){
  chaptersDiv.style.display='none';
  document.getElementById('content').innerHTML=`
    <div class="empty-state">
      <div class="icon">✅</div>
      <h3>Aucune question en cours</h3>
      <p>Tu n'as pas de questions marquées « en cours d'apprentissage » pour ce chapitre. Lance une session complète pour commencer.</p>
      <button class="btn btn-primary btn-large" onclick="back()">← Retour</button>
    </div>`;
}

function showQuestion(){
  const c=document.getElementById('content');
  c.innerHTML='';
  if(questionIndex>=allQuestions.length){endSession();return;}
  const q=allQuestions[questionIndex];
  // In-session: content is already a flex column, just append directly
  c.appendChild(buildProgressTracker());
  if(q.choices) renderQCM(q,c);
  else renderFlashcard(q,c);
}

/* ── Progress tracker ── */
function buildProgressTracker(){
  const total=allQuestions.length;
  const knownCount=questionStatus.filter(s=>s==='known').length;
  const learningCount=questionStatus.filter(s=>s==='learning').length;
  const unseenCount=total-knownCount-learningCount;
  const knownW=Math.round((knownCount/total)*100);
  const learningW=Math.round((learningCount/total)*100);

  let dots='';
  for(let i=0;i<total;i++){
    const st=i===questionIndex?'current':questionStatus[i];
    dots+=`<div class="dot ${st}" title="Q${i+1}"></div>`;
  }

  const label=reviewMode?'Révision – en cours':'Progression de la session';
  const wrap=document.createElement('div');
  wrap.className='progress-tracker';
  wrap.innerHTML=`
    <div class="progress-top">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="session-back-btn" onclick="back()">← Accueil</button>
        <span class="progress-title">${label}</span>
      </div>
      <span class="progress-count">${questionIndex+1}<span style="color:var(--muted);font-weight:400"> / ${total}</span></span>
    </div>
    <div class="seg-bar">
      <div class="seg-known"    style="width:${knownW}%"></div>
      <div class="seg-learning" style="width:${learningW}%"></div>
      <div class="seg-unseen"></div>
    </div>
    <div class="dot-strip">${dots}</div>
    <div class="progress-legend">
      <div class="prog-legend-item"><div class="prog-legend-dot" style="background:var(--known)"></div>${knownCount} maîtrisée${knownCount>1?'s':''}</div>
      <div class="prog-legend-item"><div class="prog-legend-dot" style="background:var(--learning)"></div>${learningCount} en cours</div>
      <div class="prog-legend-item"><div class="prog-legend-dot" style="background:rgba(255,255,255,0.18)"></div>${unseenCount} à voir</div>
    </div>`;
  return wrap;
}

/* ── Smart answer display: picks grammatically correct French connector ── */
function joinKeywords(exp){
  // exp = array of keyword strings e.g. ["passagers","clandestins"]
  // We join as a natural phrase; the keywords themselves are already words
  return exp.join(' ');
}

// Returns the display label for one expected element, adding a determiner when needed
// e.g. ["engagement","associatif"] → "de l'engagement associatif"
//      ["vote"] → "vote"
//      ["csp"] → "CSP"
function labelFor(exp){
  // exp is an array of strings. If it's a single long string (full sentence), display as-is.
  // If it's multiple short keywords, join them as a phrase.
  const phrase = exp.join(' ').trim();
  // Capitalise short acronyms (≤4 chars, no spaces, all lowercase)
  if(phrase === phrase.toLowerCase() && phrase.length <= 4 && !phrase.includes(' ')) return phrase.toUpperCase();
  // Capitalise first letter
  return phrase.charAt(0).toUpperCase() + phrase.slice(1);
}

function buildAnswerItems(expected){
  return expected.map(exp=>`<li>${labelFor(exp)}</li>`).join('');
}

/* ── Flashcard with adaptive height ── */
function renderFlashcard(q, container){
  isFlipped=false;
  const answers=buildAnswerItems(q.expected);

  const scene=document.createElement('div');
  scene.className='flashcard-scene';

  // Buttons markup (will live inside the back face)
  const actionsBtns=`
    <div class="fc-actions-inner" id="fcActionsInner">
      <button class="btn btn-learning-action" onclick="event.stopPropagation();markStatus('learning')">⏳&nbsp; En cours</button>
      <button class="btn btn-known"           onclick="event.stopPropagation();markStatus('known')">✓&nbsp; Je maîtrise</button>
    </div>`;

  scene.innerHTML=`
    <div class="flashcard-wrapper" id="fcWrapper">
      <!-- Sizer: front face -->
      <div class="fc-sizer fc-sizer-front" id="sizerFront">
        <div class="fc-label">Flashcard · Question ${questionIndex+1}</div>
        <div class="fc-question">${q.q}</div>
        <div class="fc-hint">Clique pour révéler la réponse</div>
      </div>
      <!-- Sizer: back face (includes buttons for accurate height) -->
      <div class="fc-sizer fc-sizer-back" id="sizerBack" style="display:none">
        <div class="fc-answer-label">Éléments de réponse</div>
        <div class="fc-back-question">${q.q}</div>
        <ul class="fc-answer-list">${answers}</ul>
        <div style="display:flex;gap:12px;width:100%;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.07)">
          <div style="flex:1;height:46px;background:rgba(245,158,11,0.12);border-radius:12px;"></div>
          <div style="flex:1;height:46px;background:rgba(22,163,74,0.15);border-radius:12px;"></div>
        </div>
      </div>
      <!-- Actual flip card -->
      <div class="flashcard" id="theCard" onclick="flipCard()">
        <div class="flashcard-face">
          <div class="fc-label">Flashcard · Question ${questionIndex+1}</div>
          <div class="fc-question">${q.q}</div>
          <div class="fc-hint">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>
            Clique pour révéler la réponse
          </div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="fc-answer-label">Éléments de réponse</div>
          <div class="fc-back-question">${q.q}</div>
          <ul class="fc-answer-list">${answers}</ul>
          ${actionsBtns}
        </div>
      </div>
    </div>`;
  container.appendChild(scene);

  // Set wrapper height to the taller of the two faces using sizers
  requestAnimationFrame(()=>{
    const front=document.getElementById('sizerFront');
    const wrapper=document.getElementById('fcWrapper');
    const card=document.getElementById('theCard');
    if(!front||!wrapper||!card) return;

    // Measure back sizer
    const backSizer=document.getElementById('sizerBack');
    backSizer.style.display='flex';
    front.style.display='none';
    const backH=backSizer.scrollHeight;
    backSizer.style.display='none';
    front.style.display='flex';
    const frontH=front.scrollHeight;

    const h=Math.max(frontH, backH, 220);
    wrapper.style.height=h+'px';
    card.style.height=h+'px';
    card.querySelectorAll('.flashcard-face').forEach(f=>f.style.height=h+'px');
  });
}

function flipCard(){
  const card=document.getElementById('theCard');
  const wrapper=document.getElementById('fcWrapper');
  if(!card||isFlipped) return;
  isFlipped=true;
  card.classList.add('flipped');

  // After the flip animation, measure the actual back face and update wrapper height
  setTimeout(()=>{
    const backFace=card.querySelector('.flashcard-back');
    if(!backFace||!wrapper) return;

    // Temporarily make back face flow-positioned to measure its natural height
    backFace.style.position='relative';
    backFace.style.transform='none';
    backFace.style.visibility='hidden';
    const backH=backFace.scrollHeight;
    backFace.style.position='';
    backFace.style.transform='';
    backFace.style.visibility='';

    const h=Math.max(backH+2, 220);
    wrapper.style.height=h+'px';
    card.style.height=h+'px';
    card.querySelectorAll('.flashcard-face').forEach(f=>f.style.height=h+'px');
  }, 560); // after animation completes (550ms)
}

function markStatus(status){
  // Update in-session status
  questionStatus[questionIndex]=status;
  // Write back to persistent store
  const origIdx=window._origIndexes[questionIndex];
  if(!statusStore[currentChapter].q[origIdx]) statusStore[currentChapter].q=statusStore[currentChapter].q||[];
  statusStore[currentChapter].q[origIdx]=status;
  saveAll();

  const ok=(status==='known');
  if(ok) session.success=(session.success||0)+1;
  answersLog.push({question:allQuestions[questionIndex].q, correct:ok, expected:allQuestions[questionIndex].expected});
  questionIndex++;
  isFlipped=false;
  showQuestion();
}

/* ── QCM ── */
function renderQCM(q,container){
  selectedChoices=[];
  const card=document.createElement('div');
  card.className='q-card';
  let html=`<div class="q-counter">QCM · Question ${questionIndex+1} / ${allQuestions.length}</div>
    <h3>${q.q}</h3>`;
  q.choices.forEach((ch,i)=>{
    html+=`<button class="qcm-choice" data-index="${i}" onclick="toggleChoice(${i},this)">${ch}</button>`;
  });
  html+=`<div class="q-actions">
    <button id="validateQCMBtn" class="btn btn-primary btn-large" disabled onclick="validateQCM()">Valider</button>
    <button class="btn btn-secondary btn-large" onclick="skipQCM()">Passer</button>
  </div>`;
  card.innerHTML=html;
  container.appendChild(card);
}

function toggleChoice(i,btn){
  const idx=selectedChoices.indexOf(i);
  if(idx>=0){selectedChoices.splice(idx,1);btn.classList.remove('active');}
  else{selectedChoices.push(i);btn.classList.add('active');}
  const vBtn=document.getElementById('validateQCMBtn');
  if(vBtn) vBtn.disabled=selectedChoices.length===0;
}

function validateQCM(){
  const q=allQuestions[questionIndex];
  const ok=q.correct.slice().sort().join(',')===selectedChoices.slice().sort().join(',');
  if(ok) session.success=(session.success||0)+1;
  const newStatus=ok?'known':'learning';
  questionStatus[questionIndex]=newStatus;
  const origIdx=window._origIndexes[questionIndex];
  statusStore[currentChapter].q[origIdx]=newStatus;
  saveAll();
  answersLog.push({question:q.q,correct:ok,expected:q.correct.map(i=>[q.choices[i]])});
  questionIndex++; showQuestion();
}

function skipQCM(){
  const q=allQuestions[questionIndex];
  questionStatus[questionIndex]='learning';
  const origIdx=window._origIndexes[questionIndex];
  statusStore[currentChapter].q[origIdx]='learning';
  saveAll();
  answersLog.push({question:q.q,correct:false,expected:q.correct?q.correct.map(i=>[q.choices[i]]):[]});
  questionIndex++; showQuestion();
}

/* ═══════════════════════════════════════
   DÉFINITIONS
═══════════════════════════════════════ */
function startDefs(id, onlyLearning){
  mode='defs'; currentChapter=id;
  answersLog=[]; session={success:0,total:0};

  const saved=statusStore[id].d||[];
  const raw=Object.entries(chapters[id].defs).map(([term,def],i)=>({term,def,origIndex:i,status:saved[i]||'unseen'}));
  let pairs=onlyLearning ? raw.filter(p=>p.status==='learning') : raw;
  if(onlyLearning && pairs.length===0){ showEmptyLearning(); return; }
  pairs=shuffle(pairs);

  defQuestions=pairs.map(p=>({term:p.term,def:p.def}));
  defStatus=pairs.map(p=>p.status);
  window._origDefIndexes=pairs.map(p=>p.origIndex);
  session.total=defQuestions.length;
  defIndex=0;
  chaptersDiv.style.display='none';
  document.body.classList.add('in-session');
  showDef();
}

function showDef(){
  const c=document.getElementById('content'); c.innerHTML='';
  if(defIndex>=defQuestions.length){endSession();return;}
  const q=defQuestions[defIndex];
  const total=defQuestions.length;
  const pct=Math.round((defIndex/total)*100);

  // Back button + progress bar as one tracker card
  const bar=document.createElement('div');
  bar.style.cssText='max-width:680px;margin:0 auto 10px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px 20px;';
  bar.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="session-back-btn" onclick="back()">← Accueil</button>
        <span class="progress-title">Définitions</span>
      </div>
      <span class="progress-count" style="font-family:'DM Mono',monospace;font-size:0.88rem;color:var(--accent)">${defIndex+1}<span style="color:var(--muted);font-weight:400"> / ${total}</span></span>
    </div>
    <div style="height:6px;border-radius:999px;background:rgba(255,255,255,0.06);overflow:hidden">
      <div style="width:${pct}%;height:6px;background:var(--accent);transition:width .4s ease;"></div>
    </div>`;
  c.appendChild(bar);

  // Fixed sorted term list — same position every time
  const terms=Object.keys(chapters[currentChapter].defs).slice().sort((a,b)=>a.localeCompare(b,'fr'));
  const card=document.createElement('div');
  card.className='q-card';
  let html=`<div class="q-counter">Définition ${defIndex+1} / ${total}</div>
    <h3>À quel terme correspond cette définition ?</h3>
    <div class="def-definition">${q.def}</div>
    <div class="def-choices-grid">`;
  terms.forEach(t=>{
    html+=`<button class="def-choice" onclick="validateDef('${t.replace(/'/g,"\\'")}')">${t}</button>`;
  });
  html+=`</div>`;
  card.innerHTML=html;
  c.appendChild(card);
}

function validateDef(term){
  const q=defQuestions[defIndex];
  const ok=term===q.term;
  if(ok) session.success=(session.success||0)+1;
  const newStatus=ok?'known':'learning';
  defStatus[defIndex]=newStatus;
  const origIdx=window._origDefIndexes[defIndex];
  if(!statusStore[currentChapter].d) statusStore[currentChapter].d=[];
  statusStore[currentChapter].d[origIdx]=newStatus;
  saveAll();
  answersLog.push({question:q.term,correct:ok,expected:[[q.term+' : '+q.def]]});
  defIndex++; showDef();
}

/* ═══════════════════════════════════════
   FIN DE SESSION
═══════════════════════════════════════ */
function endSession(){
  const total=session.total;
  const succ=session.success||0;
  if(succ>records[currentChapter].best){
    records[currentChapter].best=succ;
    saveAll();
  }
  document.body.classList.remove('in-session');
  renderChapters();
  const percent=total?Math.round((succ/total)*100):0;
  const emoji=percent>=80?'🏆':percent>=50?'✨':'💪';
  const c=document.getElementById('content');
  c.innerHTML='';

  const header=document.createElement('div');
  header.className='recap-header';
  header.innerHTML=`
    <div style="font-size:2.5rem">${emoji}</div>
    <h2>Session terminée</h2>
    <div class="score-display">${succ}<span style="font-size:1.5rem;color:var(--muted)"> / ${total}</span></div>
    <div style="font-size:0.85rem;color:var(--muted);margin-top:6px">${percent}% de maîtrise</div>`;
  c.appendChild(header);

  answersLog.forEach((a,idx)=>{
    const div=document.createElement('div');
    div.className='recap-item '+(a.correct?'ok':'ko');
    div.style.animationDelay=`${idx*0.04}s`;
    let html=`<div class="recap-q">${a.correct?'✓':'✗'} ${a.question}</div>`;
    if(!a.correct&&a.expected){
      html+=`<div class="recap-correction"><strong>Correction :</strong> ${a.expected.map(e=>Array.isArray(e)?labelFor(e):e).join(' ; ')}</div>`;
    }
    div.innerHTML=html;
    c.appendChild(div);
  });

  const btn=document.createElement('button');
  btn.className='btn btn-primary btn-large';
  btn.style.cssText='display:block;margin:28px auto 0;max-width:680px;width:100%;';
  btn.textContent="← Retour à l'accueil";
  btn.onclick=back;
  c.appendChild(btn);
}

function back(){
  document.getElementById('content').innerHTML='';
  document.body.classList.remove('in-session');
  chaptersDiv.style.display='grid';
  renderChapters();
}

function showDetails(id){
  chaptersDiv.style.display='none';
  const c=chapters[id];
  document.getElementById('content').innerHTML=`
    <div class="details-card">
      <span style="font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.08);color:var(--muted);display:inline-block;margin-bottom:12px">${c.number}</span>
      <h2>${c.title}</h2>
      <p style="margin-top:12px;color:var(--muted);line-height:1.65">${c.details||'Aucun détail disponible.'}</p>
      <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="back()">← Retour</button>
        ${c.questions.length>0?`<button class="btn btn-secondary" onclick="startQuestions('${id}',false)">Commencer</button>`:''}
      </div>
    </div>`;
}
</script>
